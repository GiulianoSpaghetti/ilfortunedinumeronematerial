name: .NET MAUI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]

    env:
      Solution_Name: ilfortuneinumeronematerial.slnx
      Configuration: ${{ matrix.configuration }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore packages
      run: dotnet restore ilfortunedinumerone.slnx

    - name: Build AValonia App
      run: |
        dotnet build ilfortunedinumeronematerial.Desktop/ilfortunedinumeronematerial.Desktop.csproj -c $env:Configuration
      shell: pwsh

    - name: Upload Avalonia App
      uses: actions/upload-artifact@v4
      with:
        name: App
        path: ilfortunedinumeronematerial.Desktop/bin/Release/net10.0-windows10.0.26100/
        include-hidden-files: true
        if-no-files-found: error
